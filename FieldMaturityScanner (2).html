<style>
:root{--bg:#faf9f6;--card:#fff;--bdr:#e8e6e0;--tx:#1a1a1a;--sub:#888;--mt:#bbb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);padding:20px 16px}
.w{max-width:940px;margin:0 auto}
.hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px}
h1{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.sub{color:var(--sub);font-size:13px;line-height:1.5;margin:2px 0 18px}
.sub small{display:block;font-size:11px;color:var(--mt)}
.langsw{display:inline-flex;gap:4px;background:#fff;border:1px solid var(--bdr);padding:4px;border-radius:10px;flex-shrink:0}
.langsw button{border:none;background:transparent;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#666;font-family:inherit}
.langsw button.on{background:#1a1a1a;color:#fff}
.c{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--bdr)}
.lb{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:2px solid #ddd;background:#fff;color:#999;font-weight:400;transition:all .15s;font-family:inherit}
.pill.on{font-weight:700}
.sr{display:flex;gap:8px}
.sr input{flex:1;padding:8px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;outline:none;font-family:inherit}
.sr button{padding:8px 18px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.sr button:disabled{background:#ccc;cursor:default}
.pb{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:6px}
.pf{height:100%;background:#2a9d8f;border-radius:2px;transition:width .3s}
.err{margin-top:8px;font-size:12px;color:#e63946;background:#fef2f2;padding:8px 12px;border-radius:6px}
.ht{font-size:10px;color:var(--mt);margin-top:6px}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.pn{font-weight:700;font-size:13px;min-width:150px}
.pb2{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:3px 10px;font-size:12px}
.pd{width:8px;height:8px;border-radius:50%;display:inline-block}
.pl{font-weight:700}
.pds{color:#777;font-size:11px}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px 8px 0 0;font-size:12px;border:1px solid var(--bdr);border-bottom:none;background:#f0efe8;font-weight:400;color:#999;cursor:pointer;font-family:inherit}
.tab.on{background:#fff;font-weight:700;color:var(--tx)}
.cc{background:#fff;border-radius:0 10px 10px 10px;padding:16px 12px;border:1px solid var(--bdr);margin-bottom:14px}
.cl{font-size:11px;color:var(--mt);margin-bottom:8px;padding-left:4px}
.cb{position:relative;width:100%;height:350px}
.cb.sm{height:160px;margin-bottom:12px}
.ct{font-size:12px;font-weight:700;margin-bottom:4px;padding-left:4px}
.lg{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;padding-left:4px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.ll{width:12px;height:3px;border-radius:2px;display:inline-block}
.gd{background:#f5f4f0;border-radius:10px;padding:14px 16px;border:1px solid var(--bdr);font-size:12px;line-height:1.8;color:#666}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gg div span:first-child{font-weight:700}
.gg div div{font-size:11px;margin-top:2px}
a{color:#457b9d;text-decoration:none;font-weight:600}a:hover{text-decoration:underline}
.ft{text-align:center;margin-top:16px;font-size:10px;color:#ccc}
.hid{display:none}
@media (max-width:700px){.hd{flex-direction:column}.langsw{align-self:flex-end}.gg{grid-template-columns:1fr}}
</style>
</head>

let topics={},sel=new Set(),ctab='pop',charts={},fetching=false;
function proc(r){const pop=[],rr=[],pp=[],ac=[],rc=[],oc=[],pc=[];YRS.forEach((y,i)=>{const a=r.all[i]||0,rv=r.rev[i]||0,p=r.pat?r.pat[i]||0:0,t=PT[y]||1e6,tp=TP[y]||300000;pop.push(Math.round((a/t)*1e5*100)/100);rr.push(a>0?Math.round((rv/a)*1000)/10:0);pp.push(Math.round((p/tp)*1e5*100)/100);ac.push(a);rc.push(rv);oc.push(a-rv);pc.push(p);});return{pop,revRatio:rr,patPop:pp,allCount:ac,revCount:rc,origCount:oc,patCount:pc};}
function cls(d){if(!d||d.pop.length<8)return"stable";const rr=d.revRatio,n=rr.length;const r3=(rr[n-1]+rr[n-2]+rr[n-3])/3,p3=(rr[n-4]+rr[n-5]+rr[n-6])/3;const g=d.pop[n-4]>0?(d.pop[n-1]-d.pop[n-4])/d.pop[n-4]:0;if(r3>33&&r3>p3+1.5&&g<0.05)return"decline";if(r3>28&&g<0.15)return"mature";if(g>0.15&&r3<25)return"growth";if(g>0.3)return"growth";return"stable";}
Object.entries(PR).forEach(([n,r])=>{const d=proc(r);topics[n]={...d,phase:cls(d),preset:true}});
sel=new Set(["Atopic dermatitis","Chronic itch","CRISPR","Neuropeptide"]);
function setLang(next){lang=next;document.documentElement.lang=I18N[lang].htmlLang;document.getElementById('langJa').classList.toggle('on',lang==='ja');document.getElementById('langEn').classList.toggle('on',lang==='en');document.getElementById('title').textContent=t('title');document.getElementById('subtitle').textContent=t('subtitle');document.getElementById('subtitleSmall').innerHTML=t('subtitleSmall');document.getElementById('topicsLabel').textContent=t('topics');document.getElementById('sIn').placeholder=t('searchPlaceholder');document.getElementById('sBtn').textContent=t('searchButton');document.getElementById('apiHint').textContent=t('apiHint');document.getElementById('phaseHeader').textContent=t('phaseHeader');document.getElementById('phaseHint').textContent=t('phaseHint');['pop','rev','pat','vs','stk'].forEach(k=>document.getElementById('tab_'+k).textContent=t('tab_'+k));['pop','rev','pat','vs','stk'].forEach(k=>document.getElementById('cl_'+k).textContent=t('cl_'+k));document.getElementById('patentSourceLabel').textContent=t('patentSourceLabel');document.getElementById('patentSourceText').textContent=t('patentSourceText');document.getElementById('patentLink1').textContent=t('patentLink1');document.getElementById('patentLink2').textContent=t('patentLink2');document.getElementById('patentLink3').textContent=t('patentLink3');document.getElementById('guideLabel').textContent=t('guideLabel');document.getElementById('guideGrowthTitle').textContent=t('guideGrowthTitle');document.getElementById('guideGrowthBody').textContent=t('guideGrowthBody');document.getElementById('guideMatureTitle').textContent=t('guideMatureTitle');document.getElementById('guideMatureBody').textContent=t('guideMatureBody');document.getElementById('guideDeclineTitle').textContent=t('guideDeclineTitle');document.getElementById('guideDeclineBody').textContent=t('guideDeclineBody');document.getElementById('guidePatentTitle').textContent=t('guidePatentTitle');document.getElementById('guidePatentBody').textContent=t('guidePatentBody');document.getElementById('footer').textContent=t('footer');render();}
function destAll(){Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy();else if(Array.isArray(c))c.forEach(x=>x.destroy())});charts={}}
function rPills(){const b=document.getElementById('pills');b.innerHTML='';Object.keys(topics).forEach((n,i)=>{const btn=document.createElement('button');btn.className='pill'+(sel.has(n)?' on':'');const c=CL[i%CL.length];if(sel.has(n)){btn.style.border=`2px solid ${c}`;btn.style.background=c+'15';btn.style.color=c}btn.textContent=(topics[n].preset?'':'✦ ')+n;btn.onclick=()=>{sel.has(n)?sel.delete(n):sel.add(n);render()};b.appendChild(btn);});}
function rPhase(){const b=document.getElementById('phL');b.innerHTML='';const ns=Object.keys(topics);ns.filter(n=>sel.has(n)).forEach(n=>{const i=ns.indexOf(n),ph=topics[n].phase,m=t('phase.'+ph);const color={growth:'#2a9d8f',mature:'#e9c46a',decline:'#e63946',stable:'#457b9d'}[ph];const r=document.createElement('div');r.className='pr';const d=topics[n];const nn=d.revRatio.length;const recent=((d.revRatio[nn-1]+d.revRatio[nn-2]+d.revRatio[nn-3])/3).toFixed(1);const growthBase=d.pop[nn-4]||0.0001;const growthPct=(((d.pop[nn-1]-d.pop[nn-4])/growthBase)*100).toFixed(0);r.innerHTML=`<span class="pn" style="color:${CL[i%CL.length]}">${n}</span><span class="pb2" style="background:${color}12;border:1.5px solid ${color}44"><span class="pd" style="background:${color}"></span><span class="pl" style="color:${color}">${m.l}</span><span class="pds">${t('recentReview')}≈${recent}%｜${t('fourYearChange')}≈${growthPct}%</span></span>`;b.appendChild(r);});}
function rLeg(){const b=document.getElementById('lgB');b.innerHTML='';const ns=Object.keys(topics);ns.filter(n=>sel.has(n)).forEach(n=>{const i=ns.indexOf(n);const e=document.createElement('div');e.className='li';e.innerHTML=`<span class="ll" style="background:${CL[i%CL.length]}"></span>${n}`;b.appendChild(e);});}
function mkLine(id,ds,yLabel,yMax){const ctx=document.getElementById(id);return new Chart(ctx,{type:'line',data:{labels:YRS,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{tooltip:{mode:'index',intersect:false,filter:it=>!it.dataset.label.includes(t('refLine'))&&!it.dataset.label.includes(t('baseline'))},legend:{display:false}},scales:{x:{grid:{display:false}},y:{title:{display:true,text:yLabel,font:{size:11}},min:0,max:yMax||undefined}},interaction:{mode:'index',intersect:false}}});}
function rPop(){const ns=Object.keys(topics);const ds=ns.filter(n=>sel.has(n)).map(n=>{const i=ns.indexOf(n);return{label:n,data:topics[n].pop,borderColor:CL[i%CL.length],backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:.3}});charts.pop=mkLine('cPop',ds,t('pubAxis'));}
function rRev(){const ns=Object.keys(topics);const ds=ns.filter(n=>sel.has(n)).map(n=>{const i=ns.indexOf(n);return{label:n,data:topics[n].revRatio,borderColor:CL[i%CL.length],backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:.3}});ds.push({label:t('refLine'),data:YRS.map(()=>30),borderColor:'#ccc',borderDash:[6,4],borderWidth:1,pointRadius:0});charts.rev=mkLine('cRev',ds,t('revAxis'),45);}
function rPat(){const ns=Object.keys(topics);const ds=ns.filter(n=>sel.has(n)).map(n=>{const i=ns.indexOf(n);return{label:n,data:topics[n].patPop,borderColor:CL[i%CL.length],backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:.3}});charts.pat=mkLine('cPat',ds,t('patAxis'));}
function rVs(){const box=document.getElementById('vsBox');box.innerHTML='';if(charts.vs)charts.vs.forEach(c=>c.destroy());charts.vs=[];const ns=Object.keys(topics);ns.filter(n=>sel.has(n)).forEach(n=>{const i=ns.indexOf(n),c=CL[i%CL.length],tpc=topics[n];const base_pub=tpc.pop[10]||1,base_pat=tpc.patPop[10]||0.01;const pubIdx=tpc.pop.map(v=>Math.round(v/base_pub*100));const patIdx=tpc.patPop.map(v=>Math.round(v/base_pat*100));const title=document.createElement('div');title.className='ct';title.style.color=c;title.textContent=n;const wrap=document.createElement('div');wrap.className='cb sm';const cv=document.createElement('canvas');wrap.appendChild(cv);box.appendChild(title);box.appendChild(wrap);const ch=new Chart(cv,{type:'line',data:{labels:YRS,datasets:[{label:t('paperIndexed'),data:pubIdx,borderColor:c,backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:.3},{label:t('patentIndexed'),data:patIdx,borderColor:c,backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.3,borderDash:[6,3]},{label:t('baseline'),data:YRS.map(()=>100),borderColor:'#ddd',borderWidth:1,pointRadius:0,borderDash:[3,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{tooltip:{mode:'index',intersect:false,filter:it=>it.dataset.label!==t('baseline')},legend:{display:true,position:'top',labels:{boxWidth:14,font:{size:10},filter:it=>it.text!==t('baseline')}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},maxTicksLimit:8}},y:{title:{display:true,text:t('indexAxis'),font:{size:10}},ticks:{font:{size:9}}}},interaction:{mode:'index',intersect:false}}});charts.vs.push(ch);});}
function rStk(){const box=document.getElementById('skBox');box.innerHTML='';if(charts.stk)charts.stk.forEach(c=>c.destroy());charts.stk=[];const ns=Object.keys(topics);ns.filter(n=>sel.has(n)).forEach(n=>{const i=ns.indexOf(n),c=CL[i%CL.length],tpc=topics[n];const title=document.createElement('div');title.className='ct';title.style.color=c;title.textContent=n;const wrap=document.createElement('div');wrap.className='cb sm';const cv=document.createElement('canvas');wrap.appendChild(cv);box.appendChild(title);box.appendChild(wrap);const ch=new Chart(cv,{type:'bar',data:{labels:YRS,datasets:[{label:t('original'),data:tpc.origCount,backgroundColor:c,borderRadius:1},{label:t('review'),data:tpc.revCount,backgroundColor:c+'55',borderRadius:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:10}}},tooltip:{mode:'index'}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9},maxTicksLimit:8}},y:{stacked:true,ticks:{font:{size:9}}}}}});charts.stk.push(ch);});}
function stab(tName,btn){ctab=tName;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');['pop','rev','pat','vs','stk'].forEach(k=>document.getElementById('a_'+k).classList.toggle('hid',k!==tName));rCharts();}
function rCharts(){destAll();if(ctab==='pop')rPop();if(ctab==='rev')rRev();if(ctab==='pat')rPat();if(ctab==='vs')rVs();if(ctab==='stk')rStk();}
function render(){rPills();rPhase();rLeg();rCharts();}
async function fPub(q,y,rev){const rv=rev?' AND review[pt]':'';const u=`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent('('+q+')'+rv+' AND '+y+'[dp]')}&rettype=count&retmode=json`;const r=await fetch(u);const d=await r.json();return parseInt(d.esearchresult.count,10)||0;}
async function fPat(q,y){try{const u=`https://api.patentsview.org/patents/query?q={"_and":[{"_text_any":{"patent_abstract":"${q}"}},{"patent_year":"${y}"}]}&f=["patent_number"]&o={"per_page":1,"matched_subentities_only":true}`;const r=await fetch(u);const d=await r.json();return d.total_patent_count||0;}catch{return 0}}
async function addCustom(){const inp=document.getElementById('sIn');const q=inp.value.trim();if(!q||fetching)return;if(topics[q]){sel.add(q);inp.value='';render();return}inp.value='';fetching=true;document.getElementById('sBtn').disabled=true;document.getElementById('pW').classList.remove('hid');document.getElementById('eB').classList.add('hid');const raw={all:[],rev:[],pat:[]};try{for(let i=0;i<YRS.length;i++){const y=YRS[i];raw.all.push(await fPub(q,y,false));await new Promise(r=>setTimeout(r,150));raw.rev.push(await fPub(q,y,true));await new Promise(r=>setTimeout(r,150));raw.pat.push(await fPat(q,y));await new Promise(r=>setTimeout(r,150));const pct=Math.round(((i+1)/YRS.length)*100);document.getElementById('pT').textContent=txt(t('fetching'),{q,pct});document.getElementById('pF').style.width=pct+'%';}const d=proc(raw);topics[q]={...d,phase:cls(d),preset:false};sel.add(q);render();}catch(e){document.getElementById('eB').textContent=t('apiError')+': '+e.message;document.getElementById('eB').classList.remove('hid');}fetching=false;document.getElementById('sBtn').disabled=false;document.getElementById('pW').classList.add('hid');}
document.getElementById('sIn').addEventListener('keydown',e=>{if(e.key==='Enter')addCustom()});
setLang(lang);
</script>
</body>
