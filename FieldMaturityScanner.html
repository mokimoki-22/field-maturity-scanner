
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Field Maturity Scanner</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.header { margin-bottom: 20px; }
.lang-btn { float: right; }
.card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
.label { font-weight: bold; }
.small { color: #555; font-size: 14px; }
</style>
</head>

<body>

<button class="lang-btn" onclick="toggleLang()">日本語 / EN</button>

<div class="header">
  <h1 id="title"></h1>
  <p id="subtitle"></p>
  <p class="small">
    DOI: 10.1016/j.heliyon.2023.e23781 ｜ 
    <a href="https://huggingface.co/spaces/hadasak/SciTrends" target="_blank">
    SciTrendsはこちら</a>
  </p>
</div>

<div class="card">
  <div class="label">Spinal cord itch</div>
  <div id="metrics1"></div>
</div>

<div class="card">
  <div class="label">Neuroimmunology</div>
  <div id="metrics2"></div>
</div>

<div class="card">
  <h3 id="scitrends_title"></h3>
  <p id="scitrends_desc"></p>
</div>

<script>
const i18n = {
  ja: {
    title: "研究分野成熟度スキャナー",
    subtitle: "Ofer et al. 2024の特徴量設計を参考にした探索ツール",
    metrics1: "直近レビュー比率≈26.5%｜4年変化≈24%",
    metrics2: "直近レビュー比率≈32.3%｜4年変化≈12%",
    scitrends_title: "SciTrendsとは？",
    scitrends_desc: "PubMedデータを用いて研究トレンドを定量化し、レビュー比率や特許などの特徴量から将来の研究人気を予測するモデル。"
  },
  en: {
    title: "Field Maturity Scanner",
    subtitle: "Exploratory tool inspired by feature design in Ofer et al. 2024",
    metrics1: "Recent review ratio ≈26.5% | 4-year change ≈24%",
    metrics2: "Recent review ratio ≈32.3% | 4-year change ≈12%",
    scitrends_title: "What is SciTrends?",
    scitrends_desc: "A framework that quantifies research trends using PubMed data and predicts future popularity using features such as review ratios and patents."
  }
};

let lang = navigator.language.startsWith("ja") ? "ja" : "en";

function updateText(){
  document.getElementById("title").innerText = i18n[lang].title;
  document.getElementById("subtitle").innerText = i18n[lang].subtitle;
  document.getElementById("metrics1").innerText = i18n[lang].metrics1;
  document.getElementById("metrics2").innerText = i18n[lang].metrics2;
  document.getElementById("scitrends_title").innerText = i18n[lang].scitrends_title;
  document.getElementById("scitrends_desc").innerText = i18n[lang].scitrends_desc;
}

function toggleLang(){
  lang = (lang === "ja") ? "en" : "ja";
  updateText();
}

updateText();
</script>

</body>
</html>
